server:
  port: 8080

spring:
  application:
    name: servicio-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: servicio-autenticacion
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: servicio-usuarios
              uri: http://localhost:8082
              predicates:
                - Path=/api/usuarios/**

            - id: servicio-productos
              uri: http://localhost:8083
              predicates:
                - Path=/api/productos/**

            - id: servicio-pedidos
              uri: http://localhost:8084
              predicates:
                - Path=/api/pedidos/**

            - id: servicio-pagos
              uri: http://localhost:8085
              predicates:
                - Path=/api/pagos/**

            - id: servicio-notificaciones
              uri: http://localhost:8086
              predicates:
                - Path=/api/notificaciones/**

            - id: servicio-reportes
              uri: http://localhost:8087
              predicates:
                - Path=/api/reportes/**

jwt:
  secret: NexoCommerceSecretKeyParaJWTDebeTenerMinimo32Caracteres2026

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always